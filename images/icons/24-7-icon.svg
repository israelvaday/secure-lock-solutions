<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <!-- Clock circle -->
  <circle cx="32" cy="32" r="28" stroke="url(#gold)" stroke-width="4" fill="none"/>
  <!-- Clock hands -->
  <line x1="32" y1="32" x2="32" y2="14" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="44" y2="32" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="url(#gold)"/>
  <!-- Hour markers -->
  <circle cx="32" cy="8" r="2" fill="url(#gold)"/>
  <circle cx="56" cy="32" r="2" fill="url(#gold)"/>
  <circle cx="32" cy="56" r="2" fill="url(#gold)"/>
  <circle cx="8" cy="32" r="2" fill="url(#gold)"/>
  <!-- 24/7 badge -->
  <rect x="40" y="44" width="22" height="14" rx="3" fill="url(#gold)"/>
  <text x="51" y="54" font-family="Arial" font-size="8" font-weight="bold" fill="#1a252f" text-anchor="middle">24/7</text>
</svg>