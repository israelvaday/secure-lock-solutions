  <rect x="34" y="12" width="14" height="16" rx="2" stroke="#1a252f" stroke-width="2" fill="none"/>
  <rect x="16" y="32" width="14" height="20" rx="2" stroke="#1a252f" stroke-width="2" fill="none"/>
  <rect x="34" y="32" width="14" height="20" rx="2" stroke="#1a252f" stroke-width="2" fill="none"/>
