<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <!-- Safe body -->
  <rect x="6" y="8" width="52" height="48" rx="4" fill="url(#gold)"/>
  <!-- Safe door frame -->
  <rect x="10" y="12" width="44" height="40" rx="2" fill="#1a252f"/>
  <!-- Inner door -->
  <rect x="14" y="16" width="36" height="32" rx="2" fill="url(#gold)"/>
  <!-- Combination dial -->
  <circle cx="32" cy="32" r="10" fill="#1a252f"/>
  <circle cx="32" cy="32" r="7" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <line x1="32" y1="25" x2="32" y2="28" stroke="url(#gold)" stroke-width="2"/>
  <line x1="32" y1="36" x2="32" y2="39" stroke="url(#gold)" stroke-width="2"/>
  <line x1="25" y1="32" x2="28" y2="32" stroke="url(#gold)" stroke-width="2"/>
  <line x1="36" y1="32" x2="39" y2="32" stroke="url(#gold)" stroke-width="2"/>
  <!-- Handle -->
  <rect x="44" y="28" width="4" height="8" rx="1" fill="#1a252f"/>
  <!-- Feet -->
  <rect x="10" y="56" width="8" height="4" fill="url(#gold)"/>
  <rect x="46" y="56" width="8" height="4" fill="url(#gold)"/>
</svg>