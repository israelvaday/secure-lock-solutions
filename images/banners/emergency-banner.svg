<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc3545"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bgGrad)"/>
  
  <!-- Warning triangle -->
  <path d="M150 220 L80 220 L150 80 L220 220 Z" fill="url(#redGrad)" stroke="url(#goldGradient)" stroke-width="4"/>
  <text x="150" y="180" font-family="Arial" font-size="80" font-weight="bold" fill="#fff" text-anchor="middle">!</text>
  
  <!-- Clock -->
  <g transform="translate(240, 100)">
    <circle cx="50" cy="50" r="45" stroke="url(#goldGradient)" stroke-width="4" fill="none"/>
    <line x1="50" y1="50" x2="50" y2="20" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="75" y2="50" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="5" fill="url(#goldGradient)"/>
  </g>
  
  <text x="380" y="100" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#redGrad)">Emergency</text>
  <text x="380" y="150" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#goldGradient)">Locksmith</text>
  <text x="380" y="200" font-family="Arial, sans-serif" font-size="24" fill="#aaa">24/7 Rapid Response</text>
  <text x="380" y="240" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#goldGradient)">(714) 341-9244</text>
</svg>