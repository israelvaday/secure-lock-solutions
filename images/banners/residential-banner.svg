<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bgGrad)"/>
  
  <!-- House outline -->
  <path d="M100 220 L100 120 L180 60 L260 120 L260 220 Z" stroke="url(#goldGradient)" stroke-width="4" fill="none"/>
  <!-- Door -->
  <rect x="155" y="150" width="50" height="70" fill="url(#goldGradient)"/>
  <circle cx="195" cy="190" r="4" fill="#1a252f"/>
  <!-- Windows -->
  <rect x="115" y="130" width="30" height="30" fill="url(#goldGradient)" opacity="0.5"/>
  <rect x="215" y="130" width="30" height="30" fill="url(#goldGradient)" opacity="0.5"/>
  
  <!-- Lock icon -->
  <g transform="translate(290, 100)">
    <rect x="0" y="30" width="50" height="40" rx="4" fill="url(#goldGradient)"/>
    <path d="M10 30 V18 C10 6 40 6 40 18 V30" stroke="url(#goldGradient)" stroke-width="6" fill="none"/>
    <circle cx="25" cy="46" r="6" fill="#1a252f"/>
  </g>
  
  <text x="380" y="120" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#goldGradient)">Residential</text>
  <text x="380" y="170" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#goldGradient)">Locksmith</text>
  <text x="380" y="220" font-family="Arial, sans-serif" font-size="20" fill="#aaa">Home Security Solutions</text>
</svg>