<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bgGrad)"/>
  
  <!-- Buildings -->
  <rect x="60" y="80" width="80" height="140" fill="url(#goldGradient)"/>
  <rect x="150" y="50" width="60" height="170" fill="url(#goldGradient)"/>
  <rect x="220" y="100" width="70" height="120" fill="url(#goldGradient)"/>
  
  <!-- Windows -->
  <g fill="#1a252f">
    <rect x="70" y="90" width="20" height="20"/>
    <rect x="100" y="90" width="20" height="20"/>
    <rect x="70" y="120" width="20" height="20"/>
    <rect x="100" y="120" width="20" height="20"/>
    <rect x="70" y="150" width="20" height="20"/>
    <rect x="100" y="150" width="20" height="20"/>
    <rect x="160" y="60" width="15" height="15"/>
    <rect x="185" y="60" width="15" height="15"/>
    <rect x="160" y="85" width="15" height="15"/>
    <rect x="185" y="85" width="15" height="15"/>
    <rect x="160" y="110" width="15" height="15"/>
    <rect x="185" y="110" width="15" height="15"/>
    <rect x="160" y="135" width="15" height="15"/>
    <rect x="185" y="135" width="15" height="15"/>
    <rect x="230" y="110" width="18" height="18"/>
    <rect x="260" y="110" width="18" height="18"/>
    <rect x="230" y="140" width="18" height="18"/>
    <rect x="260" y="140" width="18" height="18"/>
  </g>
  
  <!-- Doors -->
  <rect x="85" y="180" width="25" height="40" fill="#1a252f"/>
  <rect x="168" y="180" width="25" height="40" fill="#1a252f"/>
  <rect x="243" y="180" width="25" height="40" fill="#1a252f"/>
  
  <text x="340" y="120" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#goldGradient)">Commercial</text>
  <text x="340" y="170" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#goldGradient)">Locksmith</text>
  <text x="340" y="220" font-family="Arial, sans-serif" font-size="20" fill="#aaa">Business Security Solutions</text>
</svg>