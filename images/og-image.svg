<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Large Lock Icon -->
  <g transform="translate(100, 180)">
    <rect x="20" y="80" width="140" height="120" rx="12" fill="url(#goldGradient)"/>
    <path d="M40 80 V45 C40 10 140 10 140 45 V80" stroke="url(#goldGradient)" stroke-width="20" fill="none" stroke-linecap="round"/>
    <circle cx="90" cy="130" r="22" fill="#1a252f"/>
    <rect x="82" y="130" width="16" height="35" fill="#1a252f"/>
  </g>
  
  <!-- Company Name -->
  <text x="350" y="250" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="url(#goldGradient)">SECURE LOCK</text>
  <text x="350" y="360" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="url(#goldGradient)">SOLUTIONS</text>
  
  <!-- Tagline -->
  <text x="350" y="430" font-family="Arial, sans-serif" font-size="32" fill="#aaa" letter-spacing="4">24/7 LOCKSMITH • ORANGE COUNTY, CA</text>
  
  <!-- Phone Number -->
  <g transform="translate(350, 470)">
    <rect width="320" height="60" rx="30" fill="url(#goldGradient)"/>
    <text x="160" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a252f" text-anchor="middle">(714) 341-9244</text>
  </g>
</svg>