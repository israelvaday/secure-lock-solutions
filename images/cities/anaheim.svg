<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyGrad)"/>
  <!-- Disneyland Castle Silhouette -->
  <path d="M120 280 L120 180 L140 180 L140 140 L150 140 L150 100 L160 100 L160 80 L170 50 L180 80 L180 100 L190 100 L190 140 L200 140 L200 180 L280 180 L280 140 L290 140 L290 100 L300 100 L300 80 L310 50 L320 80 L320 100 L330 100 L330 140 L340 140 L340 180 L360 180 L360 280" fill="#1a252f" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- Stars -->
  <circle cx="50" cy="50" r="2" fill="#FFD700"/>
  <circle cx="100" cy="80" r="1.5" fill="#FFD700"/>
  <circle cx="350" cy="60" r="2" fill="#FFD700"/>
  <circle cx="380" cy="100" r="1.5" fill="#FFD700"/>
  <!-- City Name -->
  <text x="200" y="260" font-family="Georgia, serif" font-size="28" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold">ANAHEIM</text>
  <text x="200" y="285" font-family="Arial" font-size="12" fill="#888" text-anchor="middle">Orange County, CA</text>
</svg>
