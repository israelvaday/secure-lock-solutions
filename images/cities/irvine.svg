<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyGrad)"/>
  <!-- Modern Office Buildings (Irvine Business District) -->
  <rect x="50" y="150" width="60" height="130" fill="#2c3e50" stroke="url(#goldGrad)" stroke-width="1"/>
  <rect x="120" y="100" width="50" height="180" fill="#2c3e50" stroke="url(#goldGrad)" stroke-width="1"/>
  <rect x="180" y="80" width="70" height="200" fill="#2c3e50" stroke="url(#goldGrad)" stroke-width="1"/>
  <rect x="260" y="120" width="55" height="160" fill="#2c3e50" stroke="url(#goldGrad)" stroke-width="1"/>
  <rect x="325" y="140" width="45" height="140" fill="#2c3e50" stroke="url(#goldGrad)" stroke-width="1"/>
  <!-- Windows -->
  <g fill="#D4AF37" opacity="0.6">
    <rect x="190" y="95" width="8" height="8"/><rect x="205" y="95" width="8" height="8"/><rect x="220" y="95" width="8" height="8"/>
    <rect x="190" y="115" width="8" height="8"/><rect x="205" y="115" width="8" height="8"/><rect x="220" y="115" width="8" height="8"/>
  </g>
  <!-- City Name -->
  <text x="200" y="260" font-family="Georgia, serif" font-size="28" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold">IRVINE</text>
  <text x="200" y="285" font-family="Arial" font-size="12" fill="#888" text-anchor="middle">Orange County, CA</text>
</svg>
